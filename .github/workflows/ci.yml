name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  RSpec:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        alchemy_branch:
          - main
        ruby:
          - "3.2"
          - "3.3"
          - "3.4"
    env:
      ALCHEMY_BRANCH: ${{ matrix.alchemy_branch }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Restore apt cache
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/apt/cache
          key: apt-sqlite-
      - name: Install SQLite headers
        run: |
          sudo mkdir -p /home/runner/apt/cache
          sudo apt-get update -qq
          sudo apt-get install -qq --fix-missing libsqlite3-dev -o dir::cache::archives="/home/runner/apt/cache"
          sudo chown -R runner /home/runner/apt/cache
      - name: Build and test with RSpec
        env:
          RAILS_ENV: test
          DB_USER: user
          DB_PASSWORD: password
        run: bundle exec rake
  OpenAPI:
    runs-on: ubuntu-22.04
    env:
      ALCHEMY_BRANCH: main
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Restore apt cache
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/apt/cache
          key: apt-sqlite-
      - name: Install SQLite headers
        run: |
          sudo mkdir -p /home/runner/apt/cache
          sudo apt-get update -qq
          sudo apt-get install -qq --fix-missing libsqlite3-dev -o dir::cache::archives="/home/runner/apt/cache"
          sudo chown -R runner /home/runner/apt/cache
      - name: Regenerate OpenAPI spec
        env:
          RAILS_ENV: test
          OPENAPI: "1"
        run: bundle exec rake
      - name: Check for OpenAPI spec drift
        run: |
          ruby -ryaml -e '
            generated = YAML.safe_load_file("docs/openapi.yml", permitted_classes: [Date, Time])
            committed = YAML.safe_load(
              %x(git show HEAD:docs/openapi.yml),
              permitted_classes: [Date, Time]
            )
            exit 0 if generated == committed
            system("git diff docs/openapi.yml")
            abort "::error::docs/openapi.yml is out of date. Run OPENAPI=1 bundle exec rspec locally and commit the result."
          '
  Vitest:
    runs-on: ubuntu-24.04
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Restore node modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('./package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install
      - name: Run Vitest
        run: pnpm run test
